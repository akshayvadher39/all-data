<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Store</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-5">

<h1 class="text-3xl font-bold text-center mb-5">🛒 My Store</h1>


<button onclick="toggleCart()"
  class="fixed top-5 right-5 bg-black text-white px-4 py-2 rounded-full shadow-lg">
  🛒 Cart
</button>


<div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-5"></div>


<div id="cartBox" class="fixed top-16 right-5 bg-white p-4 shadow-lg w-64 rounded-lg">


  <div class="flex justify-between items-center mb-2">
    <h2 class="text-xl font-bold">Cart</h2>
    <button onclick="toggleCart()" class="text-red-500 font-bold text-lg">✖</button>
  </div>

  <ul id="cartItems"></ul>
</div>

<script>
let cart = [];
let products = [];
let isCartOpen = true;


function toggleCart() {
  const cartBox = document.getElementById("cartBox");
  isCartOpen = !isCartOpen;
  cartBox.style.display = isCartOpen ? "block" : "none";
}


async function fetchProducts() {
  const res = await fetch("https://fakestoreapi.com/products");
  const data = await res.json();
  products = data;

  const productDiv = document.getElementById("products");

  data.forEach((product, index) => {
    const card = document.createElement("div");
    card.className = "bg-white p-4 shadow rounded-lg hover:shadow-xl transition";

    card.innerHTML = `
      <img src="${product.image}" class="h-40 mx-auto">
      <h2 class="font-semibold mt-2 text-sm">${product.title}</h2>
      <p class="text-green-600 font-bold">₹${product.price}</p>

      <button onclick="addToCart(${index})"
        class="mt-3 w-full bg-gradient-to-r from-blue-500 to-purple-500 
        text-white py-2 rounded-full text-sm font-semibold 
        hover:scale-105 transition duration-200">
        + Add to Cart
      </button>
    `;

    productDiv.appendChild(card);
  });
}

function addToCart(index) {
  cart.push(products[index]);
  updateCart();
}


function updateCart() {
  const cartItems = document.getElementById("cartItems");

  cartItems.innerHTML = "";

  cart.forEach(item => {
    const li = document.createElement("li");
    li.className = "flex justify-between items-center border-b py-1 text-sm";

    li.innerHTML = `
      <span class="truncate w-32">${item.title}</span>
      <span class="text-green-600 font-bold">₹${item.price}</span>
    `;

    cartItems.appendChild(li);
  });
}


fetchProducts();
</script>

</body>
</html>
